  <text x="226" y="320" text-anchor="middle" font-size="10" fill="#374151">BM25+Syn</text>

  <!-- Group 3: Hybrid (center=330) MRR=87.7 NDCG=87.9 -->
  <rect x="291" y="72" width="36" height="228" fill="#ec4899" rx="2"/>
  <text x="309" y="68" text-anchor="middle" font-size="9" fill="#374151">87.7</text>
  <rect x="333" y="71" width="36" height="229" fill="#10b981" rx="2"/>
  <text x="351" y="67" text-anchor="middle" font-size="9" fill="#374151">87.9</text>
  <text x="330" y="320" text-anchor="middle" font-size="10" fill="#374151">Hybrid</text>

  <!-- Group 4: Hybrid+RR (center=434) MRR=86.4 NDCG=87.2 -->
  <rect x="395" y="75" width="36" height="225" fill="#ec4899" rx="2"/>
  <text x="413" y="71" text-anchor="middle" font-size="9" fill="#374151">86.4</text>
  <rect x="437" y="73" width="36" height="227" fill="#10b981" rx="2"/>
