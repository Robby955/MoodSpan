  <text x="434" y="320" text-anchor="middle" font-size="10" fill="#374151">Hybrid+RR</text>

  <!-- Group 5: Hybrid+QD (center=538) MRR=87.7 NDCG=87.9 -->
  <rect x="499" y="72" width="36" height="228" fill="#ec4899" rx="2"/>
  <text x="517" y="68" text-anchor="middle" font-size="9" fill="#374151">87.7</text>
  <rect x="541" y="71" width="36" height="229" fill="#10b981" rx="2"/>
  <text x="559" y="67" text-anchor="middle" font-size="9" fill="#374151">87.9</text>
  <text x="538" y="320" text-anchor="middle" font-size="10" fill="#374151">Hybrid+QD</text>

  <!-- Legend -->
  <rect x="220" y="355" width="12" height="12" fill="#ec4899" rx="2"/>
  <text x="236" y="365" font-size="11" fill="#374151">MRR</text>
  <rect x="320" y="355" width="12" height="12" fill="#10b981" rx="2"/>
