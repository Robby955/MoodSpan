<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" width="620" height="380" font-family="system-ui, -apple-system, sans-serif">
  <rect width="620" height="380" fill="white"/>
  <text x="330" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">Ranking Quality (MRR &amp; NDCG@10)</text>

  <!-- Y axis grid lines and labels -->
  <line x1="70" y1="300" x2="590" y2="300" stroke="#e5e7eb" stroke-width="1"/>
  <text x="62" y="304" text-anchor="end" font-size="10" fill="#6b7280">0%</text>
  <line x1="70" y1="248" x2="590" y2="248" stroke="#e5e7eb" stroke-width="1"/>
  <text x="62" y="252" text-anchor="end" font-size="10" fill="#6b7280">20%</text>
  <line x1="70" y1="196" x2="590" y2="196" stroke="#e5e7eb" stroke-width="1"/>
  <text x="62" y="200" text-anchor="end" font-size="10" fill="#6b7280">40%</text>
  <line x1="70" y1="144" x2="590" y2="144" stroke="#e5e7eb" stroke-width="1"/>
  <text x="62" y="148" text-anchor="end" font-size="10" fill="#6b7280">60%</text>
  <line x1="70" y1="92" x2="590" y2="92" stroke="#e5e7eb" stroke-width="1"/>
  <text x="62" y="96" text-anchor="end" font-size="10" fill="#6b7280">80%</text>
  <line x1="70" y1="40" x2="590" y2="40" stroke="#e5e7eb" stroke-width="1"/>
  <text x="62" y="44" text-anchor="end" font-size="10" fill="#6b7280">100%</text>

  <!-- Group 1: BM25 (center=122) MRR=62.4 NDCG=65.0 -->
  <rect x="83" y="138" width="36" height="162" fill="#ec4899" rx="2"/>
  <text x="101" y="134" text-anchor="middle" font-size="9" fill="#374151">62.4</text>
  <rect x="125" y="131" width="36" height="169" fill="#10b981" rx="2"/>
  <text x="143" y="127" text-anchor="middle" font-size="9" fill="#374151">65.0</text>
  <text x="122" y="320" text-anchor="middle" font-size="10" fill="#374151">BM25</text>

  <!-- Group 2: BM25+Syn (center=226) MRR=66.3 NDCG=70.8 -->
  <rect x="187" y="128" width="36" height="172" fill="#ec4899" rx="2"/>
  <text x="205" y="124" text-anchor="middle" font-size="9" fill="#374151">66.3</text>
  <rect x="229" y="116" width="36" height="184" fill="#10b981" rx="2"/>
